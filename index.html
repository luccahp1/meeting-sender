<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Sender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f1a;
      --surface: #151828;
      --border:  #232640;
      --accent:  #4f6ef7;
      --accent2: #7c8ff8;
      --success: #22c55e;
      --error:   #ef4444;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --radius:  14px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 1.5rem;
    }

    /* ── Header ── */
    .header { text-align: center; }
    .header .icon { font-size: 2.6rem; display: block; margin-bottom: .5rem; }
    .header h1 {
      font-size: 1.7rem; font-weight: 700; letter-spacing: -.02em;
      background: linear-gradient(135deg, #a5b4fc, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header p { color: var(--muted); font-size: .88rem; margin-top: .3rem; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      width: 100%; max-width: 500px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }

    /* ── Settings section ── */
    .settings-toggle {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
      font-size: .78rem; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: .9rem;
    }
    .settings-toggle:hover { color: var(--text); }
    .settings-toggle .arrow { transition: transform .2s; font-size: .7rem; }
    .settings-toggle.open .arrow { transform: rotate(90deg); }

    .settings-body { display: none; }
    .settings-body.visible { display: block; }

    .field { margin-bottom: .85rem; }
    .field label {
      display: block; font-size: .75rem; font-weight: 600;
      color: var(--muted); margin-bottom: .35rem; letter-spacing: .02em;
    }
    .field input {
      width: 100%; padding: .6rem .8rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: monospace; font-size: .83rem;
      transition: border-color .2s;
      outline: none;
    }
    .field input:focus { border-color: var(--accent); }

    .save-btn {
      padding: .45rem .9rem;
      background: rgba(79,110,247,.15); border: 1px solid rgba(79,110,247,.3);
      color: var(--accent2); border-radius: 7px;
      font-family: inherit; font-size: .8rem; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .save-btn:hover { background: rgba(79,110,247,.25); }

    .divider {
      border: none; border-top: 1px solid var(--border);
      margin: 1.1rem 0;
    }

    /* ── Drop zone ── */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px; padding: 3rem 1.5rem;
      text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(79,110,247,.06);
    }
    #drop-zone.has-file {
      border-color: var(--success);
      background: rgba(34,197,94,.04);
    }
    #drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon { font-size: 2.2rem; margin-bottom: .5rem; }
    .drop-title { font-size: .95rem; font-weight: 600; }
    .drop-sub   { font-size: .8rem; color: var(--muted); margin-top: .25rem; }

    /* ── File info ── */
    #file-info {
      display: none; align-items: center; gap: .7rem;
      background: rgba(79,110,247,.08);
      border: 1px solid rgba(79,110,247,.2);
      border-radius: 8px; padding: .65rem .9rem;
      margin-top: .9rem; font-size: .86rem;
    }
    #file-info.visible { display: flex; }
    #file-info .fi-icon { font-size: 1.3rem; }
    #file-info .fi-name { font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #file-info .fi-size { color: var(--muted); font-size: .76rem; white-space: nowrap; }
    #file-info .fi-clear {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1rem; padding: 0 .15rem;
      transition: color .15s;
    }
    #file-info .fi-clear:hover { color: var(--error); }

    /* ── Send button ── */
    .btn-send {
      width: 100%; margin-top: 1.1rem; padding: .82rem;
      border: none; border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      color: #fff; font-family: inherit; font-size: .97rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s, transform .1s;
    }
    .btn-send:hover:not(:disabled)  { opacity: .9; }
    .btn-send:active:not(:disabled) { transform: scale(.98); }
    .btn-send:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Status ── */
    #status {
      display: none; align-items: center; gap: .55rem;
      margin-top: .9rem; padding: .7rem .9rem;
      border-radius: 8px; font-size: .86rem; font-weight: 500;
    }
    #status.visible { display: flex; }
    #status.sending { background: rgba(79,110,247,.1);  color: var(--accent2); border: 1px solid rgba(79,110,247,.2); }
    #status.success { background: rgba(34,197,94,.1);   color: var(--success); border: 1px solid rgba(34,197,94,.2); }
    #status.error   { background: rgba(239,68,68,.1);   color: var(--error);   border: 1px solid rgba(239,68,68,.2); }
    .spinner {
      width: 15px; height: 15px; flex-shrink: 0;
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .footer { font-size: .75rem; color: var(--muted); text-align: center; }
    .footer .dest { font-family: monospace; color: var(--accent2); }
  </style>
</head>
<body>

  <div class="header">
    <span class="icon">🎙️</span>
    <h1>Meeting Sender</h1>
    <p>Send .vtt transcripts to your desktop for Hermes analysis</p>
  </div>

  <div class="card">

    <!-- Settings -->
    <div class="settings-toggle" id="settings-toggle">
      <span>⚙️ &nbsp;Connection Settings</span>
      <span class="arrow">›</span>
    </div>
    <div class="settings-body" id="settings-body">
      <div class="field">
        <label>Receiver URL</label>
        <input type="text" id="cfg-url" placeholder="http://192.168.1.100:5002" />
      </div>
      <div class="field">
        <label>Auth Token</label>
        <input type="text" id="cfg-token" placeholder="your-secret-token" />
      </div>
      <button class="save-btn" id="save-cfg">Save</button>
    </div>

    <hr class="divider" />

    <!-- Drop zone -->
    <div id="drop-zone">
      <input type="file" id="file-input" accept=".vtt" />
      <div class="drop-icon">📂</div>
      <div class="drop-title">Drag &amp; drop your .vtt file here</div>
      <div class="drop-sub">or click to browse</div>
    </div>

    <!-- File info -->
    <div id="file-info">
      <span class="fi-icon">📄</span>
      <span class="fi-name" id="fi-name">—</span>
      <span class="fi-size" id="fi-size">—</span>
      <button class="fi-clear" id="fi-clear" title="Remove">✕</button>
    </div>

    <!-- Send -->
    <button class="btn-send" id="btn-send" disabled>Send for Analysis</button>

    <!-- Status -->
    <div id="status"></div>
  </div>

  <div class="footer" id="footer-dest"></div>

  <script>
    // ── Config helpers ──────────────────────────────────────────
    const DEFAULT_URL   = 'http://192.168.1.100:5002';
    const DEFAULT_TOKEN = 'changeme';

    function loadCfg() {
      return {
        url:   localStorage.getItem('receiver_url')   || DEFAULT_URL,
        token: localStorage.getItem('receiver_token') || DEFAULT_TOKEN,
      };
    }
    function saveCfg(url, token) {
      localStorage.setItem('receiver_url',   url);
      localStorage.setItem('receiver_token', token);
    }

    const cfg = loadCfg();
    document.getElementById('cfg-url').value   = cfg.url;
    document.getElementById('cfg-token').value = cfg.token;
    updateFooter();

    function updateFooter() {
      const c = loadCfg();
      document.getElementById('footer-dest').innerHTML =
        `Sending to <span class="dest">${c.url}</span>`;
    }

    // Settings toggle
    const toggle = document.getElementById('settings-toggle');
    const body   = document.getElementById('settings-body');
    toggle.addEventListener('click', () => {
      const open = body.classList.toggle('visible');
      toggle.classList.toggle('open', open);
    });

    document.getElementById('save-cfg').addEventListener('click', () => {
      const url   = document.getElementById('cfg-url').value.trim().replace(/\/$/, '');
      const token = document.getElementById('cfg-token').value.trim();
      if (!url) return;
      saveCfg(url, token);
      updateFooter();
      body.classList.remove('visible');
      toggle.classList.remove('open');
      showStatus('success', '✓ Settings saved');
      setTimeout(clearStatus, 1800);
    });

    // ── File handling ───────────────────────────────────────────
    const dropZone  = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileInfo  = document.getElementById('file-info');
    const fiName    = document.getElementById('fi-name');
    const fiSize    = document.getElementById('fi-size');
    const fiClear   = document.getElementById('fi-clear');
    const btnSend   = document.getElementById('btn-send');
    const statusEl  = document.getElementById('status');
    let selectedFile = null;

    function fmtBytes(b) {
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
      return (b/1048576).toFixed(1) + ' MB';
    }

    function setFile(f) {
      if (!f) return;
      if (!f.name.toLowerCase().endsWith('.vtt')) {
        showStatus('error', '✕ Only .vtt files are supported');
        return;
      }
      selectedFile = f;
      fiName.textContent = f.name;
      fiSize.textContent = fmtBytes(f.size);
      fileInfo.classList.add('visible');
      dropZone.classList.add('has-file');
      btnSend.disabled = false;
      clearStatus();
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = '';
      fileInfo.classList.remove('visible');
      dropZone.classList.remove('has-file');
      btnSend.disabled = true;
      clearStatus();
    }

    function showStatus(type, msg, spinner = false) {
      statusEl.className = 'visible ' + type;
      statusEl.innerHTML = (spinner ? '<div class="spinner"></div>' : '') + `<span>${msg}</span>`;
    }
    function clearStatus() {
      statusEl.className = '';
      statusEl.innerHTML = '';
    }

    // Drag & drop
    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
    fiClear.addEventListener('click',    e => { e.stopPropagation(); clearFile(); });

    // ── Send ─────────────────────────────────────────────────────
    btnSend.addEventListener('click', async () => {
      if (!selectedFile) return;
      const c = loadCfg();

      btnSend.disabled = true;
      showStatus('sending', 'Sending transcript…', true);

      const fd = new FormData();
      fd.append('file', selectedFile, selectedFile.name);

      try {
        const res  = await fetch(`${c.url}/upload`, {
          method: 'POST',
          headers: { 'X-Auth-Token': c.token },
          body: fd,
        });

        let data = {};
        try { data = await res.json(); } catch (_) {}

        if (res.ok) {
          showStatus('success', `✓ Queued! Check your dashboard. (id: ${(data.id||'').slice(0,8)})`);
          clearFile();
        } else {
          showStatus('error', '✕ ' + (data.error || `Server error ${res.status}`));
          btnSend.disabled = false;
        }
      } catch (err) {
        showStatus('error', '✕ Cannot reach receiver — check URL in settings or confirm it\'s running');
        btnSend.disabled = false;
      }
    });
  </script>
</body>
</html>
